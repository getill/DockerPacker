# deploy.yml
---
- name: Déployer l'image Nginx customisée sur K3d
  hosts: localhost
  connection: local
  tasks:
    - name: Créer le Deployment Nginx
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: custom-nginx
            namespace: default
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: custom-nginx
            template:
              metadata:
                labels:
                  app: custom-nginx
              spec:
                containers:
                - name: nginx
                  image: my-custom-nginx:latest
                  imagePullPolicy: Never 
                  ports:
                  - containerPort: 80

    - name: Créer le Service Nginx
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: custom-nginx-svc
            namespace: default
          spec:
            type: ClusterIP
            selector:
              app: custom-nginx
            ports:
              - protocol: TCP
                port: 80
                targetPort: 80